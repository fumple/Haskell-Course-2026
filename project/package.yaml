name:                minigit
version:             0.1.0.0
github:              "fumple/Haskell-Course-2026"
license:             BSD-3-Clause
author:              "Michał Wlazło"
maintainer:          "me@fumple.pl"
copyright:           "2026 Michał Wlazło"

extra-source-files:
- README.md
- CHANGELOG.md

# Metadata used when publishing your package
# synopsis:            Short description of your package
# category:            Binary

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md file.
description:         Please see the README on GitHub at <https://github.com/fumple/Haskell-Course-2026#readme>

dependencies:
- base >= 4.7 && < 5
- bytestring
- directory
- filepath
- mtl
- SHA
- time
- transformers

ghc-options:
- -Wall
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-export-lists
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints

library:
  source-dirs: src

executables:
  minigit-exe:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - minigit

tests:
  minigit-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - minigit
    - hspec
